components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, store]
      required: [id, username, role]

    DashboardSummary:
      type: object
      properties:
        totalMaterials:
          type: integer
        totalStockInToday:
          type: number
        totalStockOutToday:
          type: number
        lowStockCount:
          type: integer
        presentToday:
          type: integer
        absentToday:
          type: integer
        totalEmployees:
          type: integer
        totalCustomers:
          type: integer
        totalChallansToday:
          type: integer
      required:
        - totalMaterials
        - totalStockInToday
        - totalStockOutToday
        - lowStockCount
        - presentToday
        - absentToday
        - totalEmployees
        - totalCustomers
        - totalChallansToday

    RecentActivity:
      type: object
      properties:
        stockIn:
          type: array
          items:
            $ref: "#/components/schemas/StockIn"
        stockOut:
          type: array
          items:
            $ref: "#/components/schemas/StockOut"
        challans:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryChallan"
      required: [stockIn, stockOut, challans]

    Material:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        unit:
          type: string
        currentStock:
          type: number
        lowStockThreshold:
          type: number
        createdAt:
          type: string
      required: [id, name, unit, currentStock, lowStockThreshold, createdAt]

    CreateMaterialBody:
      type: object
      properties:
        name:
          type: string
        unit:
          type: string
        currentStock:
          type: number
        lowStockThreshold:
          type: number
      required: [name, unit, currentStock, lowStockThreshold]

    StockIn:
      type: object
      properties:
        id:
          type: integer
        materialId:
          type: integer
        materialName:
          type: string
        quantity:
          type: number
        date:
          type: string
        supplier:
          type: string
        remarks:
          type: string
        createdAt:
          type: string
      required: [id, materialId, materialName, quantity, date, createdAt]

    CreateStockInBody:
      type: object
      properties:
        materialId:
          type: integer
        quantity:
          type: number
        date:
          type: string
        supplier:
          type: string
        remarks:
          type: string
      required: [materialId, quantity, date]

    StockOut:
      type: object
      properties:
        id:
          type: integer
        materialId:
          type: integer
        materialName:
          type: string
        quantity:
          type: number
        date:
          type: string
        purpose:
          type: string
        remarks:
          type: string
        createdAt:
          type: string
      required: [id, materialId, materialName, quantity, date, createdAt]

    CreateStockOutBody:
      type: object
      properties:
        materialId:
          type: integer
        quantity:
          type: number
        date:
          type: string
        purpose:
          type: string
        remarks:
          type: string
      required: [materialId, quantity, date]

    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        phone:
          type: string
        dailySalary:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, role, phone, dailySalary, isActive, createdAt]

    CreateEmployeeBody:
      type: object
      properties:
        name:
